<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IELTS Prep — Answer Review</title>
<style>
  :root {
    --blue:        #378ADD;
    --blue-light:  #E6F1FB;
    --blue-mid:    #B5D4F4;
    --blue-dark:   #0C447C;
    --teal:        #1D9E75;
    --teal-light:  #E1F5EE;
    --teal-dark:   #0F6E56;
    --amber:       #BA7517;
    --amber-light: #FAEEDA;
    --coral:       #D85A30;
    --coral-light: #FAECE7;
    --purple:      #7F77DD;
    --purple-light:#EEEDFE;
    --purple-dark: #3C3489;
    --green:       #639922;
    --green-light: #EAF3DE;
    --green-dark:  #3B6D11;
    --gray-50:     #F1EFE8;
    --gray-100:    #D3D1C7;
    --gray-600:    #5F5E5A;
    --gray-800:    #444441;
    --text:        #2C2C2A;
    --text-muted:  #5F5E5A;
    --border:      rgba(0,0,0,0.09);
    --bg:          #fafaf8;
    --card-bg:     #ffffff;
    --radius:      10px;
    --radius-sm:   6px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:          #1a1a18;
      --card-bg:     #242422;
      --text:        #f0efe8;
      --text-muted:  #B4B2A9;
      --border:      rgba(255,255,255,0.09);
      --blue-light:  #0c2240;
      --blue-mid:    #185FA5;
      --teal-light:  #04342C;
      --amber-light: #412402;
      --coral-light: #4A1B0C;
      --purple-light:#26215C;
      --green-light: #173404;
      --gray-50:     #2C2C2A;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── HEADER ── */
  .header { padding: 24px 32px 0; border-bottom: 1px solid var(--border); background: var(--card-bg); position: sticky; top: 0; z-index: 50; }
  .header-top { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; }
  .header h1 { font-size: 20px; font-weight: 600; }
  .header p  { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
  .header-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

  .upload-btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 9px 16px; border: 1.5px dashed var(--blue); border-radius: var(--radius-sm);
    cursor: pointer; background: var(--blue-light); font-size: 13px; font-weight: 500;
    color: var(--blue-dark); transition: background 0.15s; white-space: nowrap;
  }
  .upload-btn:hover { background: var(--blue-mid); }
  .upload-btn input { display: none; }

  .filter-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; padding-bottom: 14px; }
  select, input[type="text"] {
    padding: 7px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: var(--card-bg); color: var(--text); font-size: 13px;
    outline: none; transition: border-color 0.15s;
  }
  select:focus, input[type="text"]:focus { border-color: var(--blue); }
  .filter-label { font-size: 12px; color: var(--text-muted); font-weight: 500; }

  /* ── LAYOUT ── */
  .body-wrap { display: flex; height: calc(100vh - 120px); overflow: hidden; }

  /* ── LEFT SIDEBAR — session list ── */
  .sidebar {
    width: 280px; flex-shrink: 0; border-right: 1px solid var(--border);
    overflow-y: auto; background: var(--card-bg);
  }
  .sidebar-header { padding: 14px 16px 10px; font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-muted); border-bottom: 1px solid var(--border); }
  .session-btn {
    display: block; width: 100%; text-align: left;
    padding: 13px 16px; border: none; border-bottom: 1px solid var(--border);
    background: var(--card-bg); cursor: pointer; transition: background 0.12s;
  }
  .session-btn:hover { background: var(--gray-50); }
  .session-btn.active { background: var(--blue-light); border-left: 3px solid var(--blue); }
  .session-btn-id { font-size: 11px; font-family: monospace; color: var(--text-muted); margin-bottom: 4px; }
  .session-btn-meta { font-size: 12px; font-weight: 500; color: var(--text); }
  .session-btn-sub { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
  .session-btn-pills { display: flex; gap: 5px; margin-top: 6px; flex-wrap: wrap; }

  .sidebar-empty { padding: 32px 16px; text-align: center; font-size: 13px; color: var(--text-muted); }

  /* ── MAIN PANEL ── */
  .main-panel { flex: 1; overflow-y: auto; padding: 24px 28px; }
  .main-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); gap: 12px; text-align: center; }
  .main-empty-icon { font-size: 48px; opacity: 0.35; }
  .main-empty h3 { font-size: 16px; font-weight: 500; color: var(--text); }
  .main-empty p { font-size: 13px; }

  /* ── BLOCK SECTION ── */
  .block-section { margin-bottom: 32px; }
  .block-heading {
    display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
    padding-bottom: 10px; border-bottom: 1.5px solid var(--border);
  }
  .block-badge {
    font-size: 11px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase;
    padding: 4px 11px; border-radius: 20px; white-space: nowrap;
  }
  .block-badge.b1 { background: var(--blue-light);   color: var(--blue-dark); }
  .block-badge.b2 { background: var(--purple-light); color: var(--purple-dark); }
  .block-badge.b3 { background: var(--teal-light);   color: var(--teal-dark); }
  .block-title { font-size: 14px; font-weight: 600; color: var(--text); }
  .block-count { margin-left: auto; font-size: 12px; color: var(--text-muted); }

  /* ── QA CARD ── */
  .qa-card {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: var(--radius); margin-bottom: 14px; overflow: hidden;
    transition: box-shadow 0.15s;
  }
  .qa-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.07); }

  .qa-header {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    background: var(--gray-50);
  }
  .qa-num {
    width: 22px; height: 22px; border-radius: 50%; font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .qa-num.b1 { background: var(--blue-light);   color: var(--blue-dark); }
  .qa-num.b2 { background: var(--purple-light); color: var(--purple-dark); }
  .qa-num.b3 { background: var(--teal-light);   color: var(--teal-dark); }

  .qa-type { font-size: 12px; font-weight: 600; color: var(--text); flex: 1; }
  .qa-time { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
  .qa-date { font-size: 11px; color: var(--text-muted); white-space: nowrap; }

  .qa-body { padding: 16px; }

  .qa-section-label {
    font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
    margin-bottom: 7px;
  }
  .qa-section-label.question { color: var(--blue); }
  .qa-section-label.answer   { color: var(--teal); }

  .qa-question-text {
    font-size: 13px; color: var(--text-muted); line-height: 1.65;
    background: var(--blue-light); border-radius: var(--radius-sm);
    padding: 10px 13px; margin-bottom: 14px; white-space: pre-wrap;
  }

  .qa-answer-text {
    font-size: 14px; color: var(--text); line-height: 1.75;
    white-space: pre-wrap; border-left: 3px solid var(--teal);
    padding: 10px 14px; border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    background: var(--teal-light);
  }

  .qa-answer-empty {
    font-size: 13px; color: var(--text-muted); font-style: italic;
    padding: 10px 13px; border: 1px dashed var(--border); border-radius: var(--radius-sm);
  }

  /* word count bar */
  .qa-meta-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
  .wc-label { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
  .wc-bar-wrap { flex: 1; height: 4px; background: var(--gray-50); border-radius: 4px; overflow: hidden; }
  .wc-bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s; }

  /* ── PILLS ── */
  .pill { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
  .pill-blue   { background: var(--blue-light);   color: var(--blue-dark); }
  .pill-purple { background: var(--purple-light); color: var(--purple-dark); }
  .pill-teal   { background: var(--teal-light);   color: var(--teal-dark); }
  .pill-green  { background: var(--green-light);  color: var(--green-dark); }
  .pill-amber  { background: var(--amber-light);  color: var(--amber); }
  .pill-gray   { background: var(--gray-50);      color: var(--gray-600); }

  /* ── SUMMARY STATS BAR ── */
  .summary-bar {
    display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 22px;
    padding: 14px 18px; background: var(--card-bg); border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .summary-stat { text-align: center; min-width: 60px; }
  .summary-stat-val { font-size: 22px; font-weight: 600; line-height: 1; }
  .summary-stat-val.blue   { color: var(--blue); }
  .summary-stat-val.teal   { color: var(--teal); }
  .summary-stat-val.purple { color: var(--purple); }
  .summary-stat-val.amber  { color: var(--amber); }
  .summary-stat-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

  /* ── SEARCH HIGHLIGHT ── */
  mark { background: #fff3a3; color: var(--text); border-radius: 2px; padding: 0 1px; }
  @media (prefers-color-scheme: dark) { mark { background: #5a4a00; color: var(--text); } }

  /* ── RESPONSIVE ── */
  @media (max-width: 720px) {
    .body-wrap { flex-direction: column; height: auto; overflow: visible; }
    .sidebar { width: 100%; height: auto; max-height: 260px; border-right: none; border-bottom: 1px solid var(--border); }
    .main-panel { padding: 16px; }
    .header { padding: 16px 16px 0; }
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--gray-100); border-radius: 10px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <h1>Answer Review</h1>
      <p>IELTS Prep Platform — see what was asked and what each student wrote</p>
    </div>
    <div class="header-actions">
      <label class="upload-btn">
        &#8679; Upload CSV
        <input type="file" id="csvFile" accept=".csv">
      </label>
    </div>
  </div>
  <div class="filter-row">
    <span class="filter-label">Filter:</span>
    <select id="filterDay" title="Filter by day">
      <option value="">All days</option>
    </select>
    <select id="filterBlock" title="Filter by block">
      <option value="">All blocks</option>
      <option value="1">Block 1 — Language</option>
      <option value="2">Block 2 — Input & Response</option>
      <option value="3">Block 3 — Speaking</option>
    </select>
    <input type="text" id="searchInput" placeholder="Search answers…" style="width:200px;">
  </div>
</div>

<div class="body-wrap">

  <!-- LEFT: session list -->
  <div class="sidebar">
    <div class="sidebar-header">Sessions</div>
    <div id="session-list">
      <div class="sidebar-empty">Upload a CSV to begin</div>
    </div>
  </div>

  <!-- RIGHT: answer cards -->
  <div class="main-panel" id="main-panel">
    <div class="main-empty" id="main-empty">
      <div class="main-empty-icon">&#128196;</div>
      <h3>No session selected</h3>
      <p>Upload your CSV export from Supabase,<br>then click a session on the left to review answers.</p>
    </div>
    <div id="answers-view" style="display:none;"></div>
  </div>

</div>

<script>
// ─── STATE ────────────────────────────────────────────────────
let sessions = {};        // session_id → { meta, answers[] }
let activeSession = null;
let searchTerm = '';
let filterDay = '';
let filterBlock = '';

// ─── BLOCK META ───────────────────────────────────────────────
const BLOCK_INFO = {
  1: { label: 'Block 1', title: 'Language Construction & Natural Expression', cls: 'b1' },
  2: { label: 'Block 2', title: 'Input, Analysis & Response', cls: 'b2' },
  3: { label: 'Block 3', title: 'IELTS Speaking Simulation', cls: 'b3' },
};

const QUESTION_ORDER = [
  'natural_english_rewrite','stylistic_correction','grammar_correction',
  'collocation_replacement','advanced_paraphrasing','sentence_pattern_repetition',
  'band9_speaking_analysis','bourdain_listening','video_reflection',
  'speaking_part1','speaking_part2','speaking_part3',
];

// ─── CSV PARSE ────────────────────────────────────────────────
function splitLine(line) {
  const result = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { if (inQ && line[i+1]==='"') { cur+='"'; i++; } else inQ=!inQ; }
    else if (c===',' && !inQ) { result.push(cur); cur=''; }
    else cur += c;
  }
  result.push(cur);
  return result;
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = splitLine(lines[0]).map(h => h.trim());
  return lines.slice(1).filter(l => l.trim()).map(line => {
    const vals = splitLine(line);
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (vals[i] || '').trim(); });
    return obj;
  });
}

// ─── UPLOAD ───────────────────────────────────────────────────
document.getElementById('csvFile').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => processData(parseCSV(ev.target.result));
  reader.readAsText(file);
});

function processData(rows) {
  sessions = {};

  rows.forEach(row => {
    const sid = row.session_id;
    if (!sid) return;
    if (!sessions[sid]) {
      sessions[sid] = { session_id: sid, answers: [] };
    }
    // Parse answer row
    const answer = {
      id:             row.id,
      day:            parseInt(row.day) || 1,
      block:          parseInt(row.block) || 1,
      question_field: row.question_field || '',
      question_type:  row.question_type  || '',
      question_text:  row.question_text  || '',
      answer_text:    row.answer_text    || '',
      time_spent_ms:  parseInt(row.time_spent_ms) || 0,
      created_at:     row.created_at     || '',
    };
    sessions[sid].answers.push(answer);
  });

  // Populate day filter
  const days = [...new Set(rows.map(r => r.day).filter(Boolean))].sort((a,b)=>a-b);
  const daySelect = document.getElementById('filterDay');
  daySelect.innerHTML = '<option value="">All days</option>' +
    days.map(d => `<option value="${d}">Day ${d}</option>`).join('');

  renderSidebar();
}

// ─── SIDEBAR ─────────────────────────────────────────────────
function renderSidebar() {
  const list = document.getElementById('session-list');
  const sessList = Object.values(sessions);
  if (!sessList.length) {
    list.innerHTML = '<div class="sidebar-empty">No sessions found</div>';
    return;
  }
  list.innerHTML = sessList.map(s => {
    const answers = applyFilters(s.answers);
    const blocks  = [...new Set(s.answers.map(a => a.block))].sort();
    const days    = [...new Set(s.answers.map(a => a.day))].sort();
    const shortId = s.session_id.slice(-14);
    const pills   = blocks.map(b => `<span class="pill pill-${b===1?'blue':b===2?'purple':'teal'}">Block ${b}</span>`).join('');
    const dayPill = days.map(d => `<span class="pill pill-gray">Day ${d}</span>`).join('');
    return `<button class="session-btn${activeSession===s.session_id?' active':''}" onclick="selectSession('${s.session_id}')">
      <div class="session-btn-id">${shortId}…</div>
      <div class="session-btn-meta">${answers.length} answer${answers.length!==1?'s':''}</div>
      <div class="session-btn-pills">${dayPill}${pills}</div>
    </button>`;
  }).join('');
}

// ─── FILTERS ─────────────────────────────────────────────────
document.getElementById('filterDay').addEventListener('change', e => { filterDay = e.target.value; rerender(); });
document.getElementById('filterBlock').addEventListener('change', e => { filterBlock = e.target.value; rerender(); });
document.getElementById('searchInput').addEventListener('input', e => {
  searchTerm = e.target.value.toLowerCase().trim();
  rerender();
});

function applyFilters(answers) {
  return answers.filter(a => {
    if (filterDay && String(a.day) !== filterDay) return false;
    if (filterBlock && String(a.block) !== filterBlock) return false;
    if (searchTerm) {
      const haystack = (a.answer_text + ' ' + a.question_text + ' ' + a.question_type).toLowerCase();
      if (!haystack.includes(searchTerm)) return false;
    }
    return true;
  });
}

function rerender() {
  renderSidebar();
  if (activeSession) renderAnswers(activeSession);
}

// ─── SESSION SELECT ───────────────────────────────────────────
function selectSession(sid) {
  activeSession = sid;
  document.querySelectorAll('.session-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.session-btn').forEach(b => {
    if (b.onclick && b.onclick.toString().includes(sid)) b.classList.add('active');
  });
  renderAnswers(sid);
}

// ─── RENDER ANSWERS ───────────────────────────────────────────
function renderAnswers(sid) {
  const s = sessions[sid];
  if (!s) return;

  document.getElementById('main-empty').style.display = 'none';
  const view = document.getElementById('answers-view');
  view.style.display = 'block';

  const filtered = applyFilters(s.answers);
  if (!filtered.length) {
    view.innerHTML = '<div style="text-align:center;padding:48px;color:var(--text-muted);font-size:14px;">No answers match the current filter.</div>';
    return;
  }

  // Sort by day → block → question order
  filtered.sort((a, b) => {
    if (a.day !== b.day) return a.day - b.day;
    if (a.block !== b.block) return a.block - b.block;
    return QUESTION_ORDER.indexOf(a.question_field) - QUESTION_ORDER.indexOf(b.question_field);
  });

  // Summary bar
  const totalWords = filtered.reduce((sum, a) => sum + wordCount(a.answer_text), 0);
  const totalTime  = filtered.reduce((sum, a) => sum + a.time_spent_ms, 0);
  const avgWords   = filtered.length ? Math.round(totalWords / filtered.length) : 0;
  const blocks     = [...new Set(filtered.map(a => a.block))];

  let html = `<div class="summary-bar">
    <div class="summary-stat"><div class="summary-stat-val blue">${filtered.length}</div><div class="summary-stat-label">Answers</div></div>
    <div class="summary-stat"><div class="summary-stat-val teal">${totalWords.toLocaleString()}</div><div class="summary-stat-label">Total words</div></div>
    <div class="summary-stat"><div class="summary-stat-val purple">${avgWords}</div><div class="summary-stat-label">Avg words</div></div>
    <div class="summary-stat"><div class="summary-stat-val amber">${fmtMs(totalTime)}</div><div class="summary-stat-label">Total time</div></div>
    <div class="summary-stat" style="margin-left:auto">
      <div style="font-family:monospace;font-size:11px;color:var(--text-muted);text-align:right">${sid.slice(-20)}…</div>
      <div style="font-size:11px;color:var(--text-muted);margin-top:2px;text-align:right">session</div>
    </div>
  </div>`;

  // Group by day → block
  const byDayBlock = {};
  filtered.forEach(a => {
    const key = `${a.day}_${a.block}`;
    if (!byDayBlock[key]) byDayBlock[key] = { day: a.day, block: a.block, answers: [] };
    byDayBlock[key].answers.push(a);
  });

  const maxWords = Math.max(...filtered.map(a => wordCount(a.answer_text)), 1);

  Object.values(byDayBlock)
    .sort((a, b) => a.day !== b.day ? a.day - b.day : a.block - b.block)
    .forEach(group => {
      const bi = BLOCK_INFO[group.block] || { label: `Block ${group.block}`, title: '', cls: 'b1' };
      html += `<div class="block-section">
        <div class="block-heading">
          <span class="block-badge ${bi.cls}">Day ${group.day} · ${bi.label}</span>
          <span class="block-title">${bi.title}</span>
          <span class="block-count">${group.answers.length} question${group.answers.length!==1?'s':''}</span>
        </div>`;

      group.answers.forEach((a, i) => {
        const wc   = wordCount(a.answer_text);
        const pct  = Math.round((wc / maxWords) * 100);
        const barColor = group.block===1?'var(--blue)':group.block===2?'var(--purple)':'var(--teal)';
        const isEmpty  = !a.answer_text.trim();

        html += `<div class="qa-card">
          <div class="qa-header">
            <div class="qa-num ${bi.cls}">${i+1}</div>
            <div class="qa-type">${a.question_type || a.question_field.replace(/_/g,' ')}</div>
            ${a.time_spent_ms ? `<div class="qa-time">&#9201; ${fmtMs(a.time_spent_ms)}</div>` : ''}
            ${a.created_at   ? `<div class="qa-date" style="margin-left:8px">${fmtDate(a.created_at)}</div>` : ''}
          </div>
          <div class="qa-body">
            ${a.question_text ? `
              <div class="qa-section-label question">&#128196; Question / Task</div>
              <div class="qa-question-text">${highlightSearch(escHtml(a.question_text))}</div>
            ` : ''}
            <div class="qa-section-label answer">&#9998; Student's answer</div>
            ${isEmpty
              ? `<div class="qa-answer-empty">No answer submitted</div>`
              : `<div class="qa-answer-text">${highlightSearch(escHtml(a.answer_text))}</div>`
            }
            ${!isEmpty ? `
              <div class="qa-meta-row">
                <span class="wc-label">${wc} word${wc!==1?'s':''}</span>
                <div class="wc-bar-wrap">
                  <div class="wc-bar-fill" style="width:${pct}%;background:${barColor};opacity:0.55;"></div>
                </div>
              </div>` : ''}
          </div>
        </div>`;
      });

      html += '</div>';
    });

  view.innerHTML = html;
}

// ─── HELPERS ─────────────────────────────────────────────────
function wordCount(text) {
  return text ? text.trim().split(/\s+/).filter(w => w.length > 0).length : 0;
}

function fmtMs(ms) {
  if (!ms) return '—';
  const m = Math.floor(ms / 60000);
  const s = Math.floor((ms % 60000) / 1000);
  return m > 0 ? `${m}m ${s}s` : `${s}s`;
}

function fmtDate(iso) {
  if (!iso) return '';
  try { return new Date(iso).toLocaleString('en-GB', { dateStyle: 'short', timeStyle: 'short' }); }
  catch { return iso; }
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlightSearch(text) {
  if (!searchTerm) return text;
  const escaped = searchTerm.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
}
